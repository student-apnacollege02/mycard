<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=  , initial-scale=1.0">
    <title>MSD Card</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }
        body {
            background: url(image.png);
            background-repeat: no-repeat;
            background-size: cover;
            width: 100vw;
            height: 100vh;
            display: grid;
            place-content: center;
        }
        div {
            background-color: black;
            width: 400px;
            border-radius: 20px;
            text-align: center;
        }
        img {
            width: 400px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }
        a {
            font-size: 40px;
            background-color: yellow;
            display: block;
            margin: 10px;
            padding: 10px;
            border-radius: 15px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div>
        <img src="photo.png" alt="Mahi Bhai">
        <a href="https://instagram.com/mahi7781">@mahi7781</a>
    </div>
</body>
</html>
